<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Modal</title>
    <link rel="stylesheet" href="../../assets/css/common.css" />
    <link rel="stylesheet" href="heart.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-------------------------HEART MODAL-------------------------->
    <div class="heart-modal-container">
      <div class="heart-modal-header">
        <!-------------------------CLOSE MODAL SVG-------------------------->
        <div class="close-heart-modal">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            stroke="#000000"
            stroke-width="0.00024000000000000003"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M5.29289 5.29289C5.68342 4.90237 6.31658 4.90237 6.70711 5.29289L12 10.5858L17.2929 5.29289C17.6834 4.90237 18.3166 4.90237 18.7071 5.29289C19.0976 5.68342 19.0976 6.31658 18.7071 6.70711L13.4142 12L18.7071 17.2929C19.0976 17.6834 19.0976 18.3166 18.7071 18.7071C18.3166 19.0976 17.6834 19.0976 17.2929 18.7071L12 13.4142L6.70711 18.7071C6.31658 19.0976 5.68342 19.0976 5.29289 18.7071C4.90237 18.3166 4.90237 17.6834 5.29289 17.2929L10.5858 12L5.29289 6.70711C4.90237 6.31658 4.90237 5.68342 5.29289 5.29289Z"
                fill="#0F1729"
              ></path>
            </g>
          </svg>
        </div>
        <!-------------------------MODAL TITLE-------------------------->
        <div class="heart-modal-title">
          <h1>Nuovo colore</h1>
        </div>
        <!-------------------------MODAL INFO-------------------------->
        <div class="heart-modal-info">
          <i class="fa-regular fa-circle-question" style="color: #000000"></i>
        </div>
      </div>
      <!--------------------MODAL BODY----------------------->
      <div class="heart-modal-body">
        <form class="heart-form">
          <div class="heart-form-body">
            <div class="heart-input-group">
              <label for="heart-nome">Nome</label>
              <input
                type="text"
                id="heart-nome"
                name="heart-nome"
                placeholder="Il mio nuovo colore"
                value=""
              />
            </div>
            <div class="heart-input-group">
              <label for="heart-color">Colore</label>
              <input type="text" id="heart-color" name="heart-color" value="" />
            </div>
          </div>
          <div class="heart-button-container">
            <button class="heart-submit-button" type="submit">Salva</button>
          </div>
        </form>
      </div>
    </div>

    <!-------------------------ERROR HEART MODAL-------------------------->
    <div class="heart-error-container">
      <div class="heart-modal-header">
        <!-------------------------CLOSE MODAL SVG-------------------------->
        <div class="close-heart-modal">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            stroke="#000000"
            stroke-width="0.00024000000000000003"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M5.29289 5.29289C5.68342 4.90237 6.31658 4.90237 6.70711 5.29289L12 10.5858L17.2929 5.29289C17.6834 4.90237 18.3166 4.90237 18.7071 5.29289C19.0976 5.68342 19.0976 6.31658 18.7071 6.70711L13.4142 12L18.7071 17.2929C19.0976 17.6834 19.0976 18.3166 18.7071 18.7071C18.3166 19.0976 17.6834 19.0976 17.2929 18.7071L12 13.4142L6.70711 18.7071C6.31658 19.0976 5.68342 19.0976 5.29289 18.7071C4.90237 18.3166 4.90237 17.6834 5.29289 17.2929L10.5858 12L5.29289 6.70711C4.90237 6.31658 4.90237 5.68342 5.29289 5.29289Z"
                fill="#0F1729"
              ></path>
            </g>
          </svg>
        </div>
        <!-------------------------MODAL TITLE-------------------------->
        <div class="heart-modal-title">
          <h1>Elimina colore</h1>
        </div>
      </div>
      <!-------------------------MODAL BODY-------------------------->
      <div class="heart-error-body">
        <p>Vuoi davvero eliminare questo colore?</p>
      </div>
      <div class="heart-error-footer">
        <button class="heart-submit-button error-undo-color" type="submit">
          Annulla
        </button>
        <button class="heart-submit-button error-delete-color" type="submit">
          Elimina
        </button>
      </div>
    </div>
    <!-------------------------OVERLAY-------------------------->
    <div class="heart-modal-overlay"></div>
  </body>
</html>
