<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="modal_registrazione.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="overlay overlay-modal">
      <div class="container-modal-registrazione">
        <div class="btnX"><i class="fa-solid fa-x"></i></div>
        <h1><strong>Ciao!</strong></h1>
        <span
          >Usa la tua email o un altro servizio per continuare con
          coolors.</span
        >
        <div class="modal-suscribe-google">
          <i class="fa-brands fa-google"></i>
          <span>Continua con Google</span>
        </div>
        <div class="modal-suscribe-apple">
          <i class="fa-brands fa-apple"></i>
          <span>Continua con Apple</span>
        </div>
        <div class="modal-suscribe-email">
          <span>Continua con email</span>
        </div>
        <div class="modalPrivacy">
          <span
            >Continuando, accetti i nostri
            <strong>Termini di servizio.</strong></span
          >
          <span
            >Leggi la nostra <strong>informativa sulla Privacy.</strong></span
          >
        </div>
      </div>
    </div>
  </body>
</html>
